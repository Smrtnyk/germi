name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Fast feedback: build + test the standalone engine on Linux only.
  proxy-core:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: Clippy proxy-core (no GUI deps)
        run: cargo clippy -p proxy-core --all-targets --locked -- -D warnings
      - name: Test proxy-core (no GUI deps)
        run: cargo test -p proxy-core --locked

  # Verify the Tauri shell compiles and its unit tests pass (Linux). Native
  # installer builds for Windows + Linux are skipped for now — to restore them,
  # re-add a `tauri-apps/tauri-action@v0` step across an OS matrix (with the
  # Windows NASM step) to bundle the .msi/.exe + .deb/.AppImage/.rpm.
  tauri-shell:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            patchelf \
            build-essential \
            cmake \
            nasm \
            file

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."

      # proxy-core is linted in the fast job; here we cover the germi shell.
      - name: Clippy Tauri shell
        run: cargo clippy -p germi --all-targets --locked -- -D warnings

      # The shell's unit tests (rule_store SQLite + --viewer arg parsing) are
      # compiled by the clippy step above but must also be run.
      - name: Test Tauri shell
        run: cargo test -p germi --locked

  # Frontend checks need neither the GTK/WebKit system libs nor the Rust
  # toolchain, so they run as their own parallel job for fast feedback.
  frontend:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Lint frontend (oxlint)
        run: pnpm lint

      - name: Check formatting (oxfmt)
        run: pnpm format:check

      - name: Analyze frontend (fallow)
        run: pnpm fallow

      - name: Build frontend (tsc + vite)
        run: pnpm build

      # Vitest browser-mode (component tests, `src/**/*.test.tsx`) drives a real
      # headless Chromium via Playwright; the node project needs no browser.
      - name: Read Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies.playwright")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright Chromium
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium (vitest browser mode)
        run: pnpm exec playwright install --with-deps chromium

      - name: Test frontend (vitest)
        run: pnpm test
