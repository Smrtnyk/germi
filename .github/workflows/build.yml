name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Fast feedback: build + test the standalone engine on Linux only.
  proxy-core:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: Clippy proxy-core (no GUI deps)
        run: cargo clippy -p proxy-core --all-targets -- -D warnings
      - name: Test proxy-core (no GUI deps)
        run: cargo test -p proxy-core

  # The desktop app must be built natively on each OS — Tauri cannot
  # cross-compile between Windows and Linux.
  app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            patchelf \
            build-essential \
            cmake \
            nasm \
            file

      - name: Install NASM (Windows — required to build aws-lc-rs)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."

      # Lint the Tauri shell on Linux only — it needs the GTK/WebKit dev libs
      # installed above. proxy-core is linted in the fast job; here we cover germi.
      - name: Clippy Tauri shell (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: cargo clippy -p germi --all-targets -- -D warnings

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the desktop app (bundles installers)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a v* tag push, publish a draft release with the installers.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Germi {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
