name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Fast feedback: build + test the standalone engine on Linux only.
  proxy-core:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: Clippy proxy-core (no GUI deps)
        run: cargo clippy -p proxy-core --all-targets -- -D warnings
      - name: Test proxy-core (no GUI deps)
        run: cargo test -p proxy-core

  # Verify the Tauri shell compiles and the frontend builds (Linux). Native
  # installer builds for Windows + Linux are skipped for now — to restore them,
  # re-add a `tauri-apps/tauri-action@v0` step across an OS matrix (with the
  # Windows NASM step) to bundle the .msi/.exe + .deb/.AppImage/.rpm.
  app:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            patchelf \
            build-essential \
            cmake \
            nasm \
            file

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."

      # proxy-core is linted in the fast job; here we cover the germi shell.
      - name: Clippy Tauri shell
        run: cargo clippy -p germi --all-targets -- -D warnings

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Lint frontend (oxlint)
        run: pnpm lint

      - name: Check formatting (oxfmt)
        run: pnpm format:check

      - name: Analyze frontend (fallow)
        run: pnpm fallow

      - name: Build frontend (tsc + vite)
        run: pnpm build

      - name: Test frontend (vitest)
        run: pnpm test
