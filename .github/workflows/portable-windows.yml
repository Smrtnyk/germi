name: portable-windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  portable-exe:
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      # aws-lc-rs (via hudsucker/rustls) needs NASM to assemble on Windows.
      - uses: ilammy/setup-nasm@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      # Only main saves the cache; tag/manual runs restore it without adding
      # extra Windows target dirs to the shared 10 GB cache quota.
      # cache-on-failure: a red main run must still save the dependency cache,
      # or every later run pays the full cold compile again.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # The bare exe IS the portable app: the frontend dist is embedded at
      # compile time and there are no sidecars/resources. The only runtime
      # dependency is the evergreen WebView2 shipped with Windows 10/11.
      - name: Build portable exe
        run: pnpm tauri build --no-bundle

      - name: Stage artifact
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { $env:GITHUB_SHA.Substring(0, 7) }
          Copy-Item target/release/germi.exe "Germi-portable-$version-windows-x64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: germi-portable-windows-x64
          path: Germi-portable-*.exe
          if-no-files-found: error

  # Tag pushes only: attach the exe to the GitHub release (as a draft if the
  # release doesn't exist yet). Split into its own job so the build job never
  # carries write permissions.
  release:
    if: github.ref_type == 'tag'
    needs: portable-exe
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: germi-portable-windows-x64

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          exe=$(ls Germi-portable-*.exe)
          gh release upload "$GITHUB_REF_NAME" "$exe" --clobber ||
            gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" --generate-notes "$exe"
